<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BondStats | US Yield</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== BASE ===== */
body{
margin:0;
font-family:Inter,system-ui;
background:#06121f;
color:#e6edf5;
}

.wrap{
max-width:880px;
margin:auto;
padding:20px;
}

/* ===== HEADER ===== */
.title{
font-size:20px;
font-weight:600;
}

.subtitle{
font-size:12px;
color:#7f96b2;
margin-top:3px;
}

/* ===== METRICS ===== */
.metrics{
display:flex;
gap:20px;
margin-top:12px;
font-size:13px;
color:#9fb2c9;
flex-wrap:wrap;
}

.metrics b{
color:#fff;
font-weight:500;
}

/* ===== CONTROLS ===== */
.controls{
margin-top:12px;
}

.btn{
background:none;
border:none;
color:#7f96b2;
font-size:12px;
margin-right:10px;
cursor:pointer;
}

.btn.active{
color:#fff;
font-weight:500;
}

/* ===== CHART ===== */
.chart-box{
margin-top:10px;
height:240px;
}

/* ===== SIGNAL ===== */
.signal{
margin-top:12px;
font-size:13px;
color:#c6d4e5;
}

/* ===== FOOTER ===== */
.footer{
margin-top:10px;
font-size:11px;
color:#6f859f;
}

</style>
</head>

<body>

<div class="wrap">

<div class="title">US Yield</div>
<div class="subtitle">US 10Y Treasury (daily)</div>

<div class="metrics" id="metrics"></div>

<div class="controls">
<button class="btn active" onclick="setRange(7, event)">1W</button>
<button class="btn" onclick="setRange(30, event)">1M</button>
<button class="btn" onclick="setRange(90, event)">3M</button>
<button class="btn" onclick="setRange(365, event)">1Y</button>
</div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<div class="signal" id="signal"></div>

<div class="footer">
FRED Data (DGS10) · Daily
</div>

</div>

<script>

let chart;
let range = 30;

/* ===== DATA SOURCE ===== */

const HIST_URL = "https://botapi33.github.io/bondstats-global-yields/us_yield_history.json";

/* ===== FETCH ===== */

async function fetchUS(){

const res = await fetch(HIST_URL);
const data = await res.json();

/* letzte X Tage */
return data.slice(-range);

}

/* ===== CHART ===== */

function drawChart(data){

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:data.map(d=>d.date),
datasets:[{
data:data.map(d=>d.value),
borderColor:"#6ee7b7",
borderWidth:2,
pointRadius:0,
tension:0.15
}]
},
options:{
responsive:true,
maintainAspectRatio:false,

interaction:{
mode:"nearest",
intersect:false
},

plugins:{
legend:{display:false},
tooltip:{
backgroundColor:"#0b1f33",
titleColor:"#fff",
bodyColor:"#cfe3f5",
displayColors:false,
callbacks:{
label:ctx => ctx.raw.toFixed(2) + "%"
}
}
},

scales:{
x:{
ticks:{display:false},
grid:{display:false}
},
y:{
ticks:{
color:"#7f96b2",
callback:v => v.toFixed(2) + "%"
},
grid:{
color:"rgba(255,255,255,0.05)"
}
}
}
}
});

}

/* ===== SIGNAL ===== */

function signal(change,trend){

if(change > 0 && trend > 0){
return "Yields rising with momentum → tightening conditions";
}

if(change > 0){
return "Short-term increase in yields";
}

if(change < 0 && trend < 0){
return "Yields declining → easing conditions";
}

if(change < 0){
return "Mild pullback in yields";
}

return "Stable yield environment";

}

/* ===== LOAD ===== */

async function load(){

const data = await fetchUS();

const latest = data[data.length - 1];
const prev = data[data.length - 2];

const change = latest.value - prev.value;
const trend = latest.value - data[0].value;

/* METRICS */

document.getElementById("metrics").innerHTML = `
Yield: <b>${latest.value.toFixed(2)}%</b>
Daily: <b style="color:${change>0?'#6ee7b7':'#ff6b6b'}">${change.toFixed(2)}</b>
Updated: <b>${latest.date}</b>
`;

/* CHART */

drawChart(data);

/* SIGNAL */

document.getElementById("signal").innerText = signal(change, trend);

}

/* ===== RANGE ===== */

function setRange(r, ev){

range = r;

document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
ev.target.classList.add("active");

load();

}

load();

</script>

</body>
</html>
